name: Tests

on:
  push:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      - name: Install dependencies
        run: pip install pytest pyyaml mypy-extensions
      - name: Run tests
        run: pytest tests/ -v
